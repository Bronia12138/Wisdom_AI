server:
  port: 8087  #端口
  tomcat:
    uri-encoding: UTF-8   #服务编码
  error:
    include-message: always #返回的响应体带上message
spring:
  profiles:
    active: local
  application:
    name: pay-service
gt:
  swagger:
    enable: true
    enableResponseWrap: true
    package-path: com.tianji.pay.controller
    title: 天机学堂 - 支付中心接口文档
    description: 该服务提供微信、支付宝等各种平台的支付、退款等功能
    contact-name: 传智教育·研究院
    contact-url: http://www.itcast.cn/
    contact-email: zhanghuyi@itcast.cn
    version: v1.0
  jdbc:
    database: gt_pay
  pay:
    notifyHost: ${GT_PAY_NOTIFY_HOST:http://localhost:8087/ps}
    ali:
      appId: ${GT_PAY_ALI_APP_ID:}
      merchantPrivateKey: ${GT_PAY_ALI_MERCHANT_PRIVATE_KEY:}
      publicKey: ${GT_PAY_ALI_PUBLIC_KEY:}
    wx:
      appId: ${GT_PAY_WX_APP_ID:}
      mchId: ${GT_PAY_WX_MCH_ID:}
      mchSerialNo: ${GT_PAY_WX_MCH_SERIAL_NO:}
      privateKey: ${GT_PAY_WX_PRIVATE_KEY:}
      apiV3Key: ${GT_PAY_WX_API_V3_KEY:}
